<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; worker-src 'self'; img-src 'self' blob: data:; media-src 'self' blob: data:; connect-src 'self';">
  <title>BugCapture — предпросмотр</title>
  <link rel="stylesheet" href="modal.css">
</head>
<body>
  <div id="modal-root">

    <!-- Заголовок -->
    <div class="modal-header">
      <div class="modal-title">
        <img class="modal-logo" src="../icons/icon.png" alt="BugCapture">
        <span>BugCapture</span>
        <span class="modal-subtitle">предпросмотр записи</span>
      </div>
      <button id="btn-close" class="btn-icon" title="Закрыть (Esc)" aria-label="Закрыть">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="4" y1="4" x2="16" y2="16"/>
          <line x1="16" y1="4" x2="4" y2="16"/>
        </svg>
      </button>
    </div>

    <!-- Видеоплеер -->
    <div class="video-wrapper">
      <video id="preview-video" preload="none" playsinline>
        Ваш браузер не поддерживает воспроизведение видео.
      </video>
      <div id="video-overlay" class="video-overlay" aria-hidden="true">
        <div id="loading-spinner" class="spinner" style="display:none;">
          <div class="spinner-ring"></div>
          <div class="spinner-label">Загрузка...</div>
        </div>
        <div id="conversion-progress" style="display:none;">
          <div class="progress-label">Конвертация в MP4...</div>
          <div class="progress-bar-wrap">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <div id="progress-percent" class="progress-percent">0%</div>
        </div>
      </div>
    </div>

    <!-- Временная шкала -->
    <div class="timeline-section">
      <div class="time-display">
        <span id="time-current">0:00</span>
        <span class="time-sep">/</span>
        <span id="time-total">0:00</span>
      </div>
      <div class="trim-sliders" role="group" aria-label="Обрезка видео">
        <div class="slider-row">
          <label class="slider-label" for="trim-start">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 7h10M7 2l5 5-5 5"/>
            </svg>
            Начало
          </label>
          <input type="range" id="trim-start" class="trim-slider" min="0" max="100" value="0" step="0.1" aria-label="Точка начала обрезки">
          <span id="trim-start-time" class="trim-time">0:00</span>
        </div>
        <div class="slider-row">
          <label class="slider-label" for="trim-end">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 7H2M7 2L2 7l5 5"/>
            </svg>
            Конец
          </label>
          <input type="range" id="trim-end" class="trim-slider" min="0" max="100" value="100" step="0.1" aria-label="Точка конца обрезки">
          <span id="trim-end-time" class="trim-time">0:00</span>
        </div>
      </div>
      <!-- Визуальная временная шкала -->
      <div class="timeline-bar" id="timeline-bar" role="presentation">
        <div id="timeline-range" class="timeline-range"></div>
        <div id="timeline-playhead" class="timeline-playhead"></div>
      </div>
    </div>

    <!-- Контролы воспроизведения -->
    <div class="controls-section">
      <div class="playback-controls">
        <button id="btn-rewind" class="btn-control" title="К началу выделения" aria-label="К началу выделения">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M4 4v12M8 10l8-6v12z"/>
          </svg>
        </button>
        <button id="btn-play-pause" class="btn-control btn-primary" title="Воспроизвести / Пауза (Пробел)" aria-label="Воспроизвести">
          <svg id="icon-play" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="icon-pause" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
            <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
          </svg>
        </button>
        <button id="btn-forward" class="btn-control" title="К концу выделения" aria-label="К концу выделения">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M16 4v12M12 10L4 4v12z"/>
          </svg>
        </button>
      </div>

      <div class="action-controls">
        <div class="format-badge" id="format-badge">WebM</div>
        <button id="btn-restart" class="btn-secondary" title="Перезапустить запись">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M2 8a6 6 0 1 1 1.5 4"/>
            <path d="M2 12V8h4"/>
          </svg>
          Записать заново
        </button>
        <button id="btn-save" class="btn-save" title="Сохранить обрезанное видео">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 2v10M5 8l4 4 4-4"/>
            <path d="M2 14h14"/>
          </svg>
          <span id="save-label">Сохранить</span>
        </button>
      </div>
    </div>

    <!-- Информация о выделении -->
    <div class="selection-info">
      <span id="selection-duration">Выделено: — сек</span>
      <span id="file-size-estimate">Размер: ~—</span>
    </div>

  </div>

  <script src="../libs/ffmpeg/ffmpeg.js"></script>
  <script src="modal.js"></script>
</body>
</html>
